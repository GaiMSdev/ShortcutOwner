name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Swift ${{ matrix.swift }} on macOS
    runs-on: macos-14
    strategy:
      matrix:
        swift: ["5.9", "5.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test -v
